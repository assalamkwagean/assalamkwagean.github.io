<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Top-Up - Tabungan Santri</title>
  <link href="./css/tailwind.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <link href="./css/select2-custom.css" rel="stylesheet">
  <script src="./config.js"></script>
  <script src="./js/gas-shim.js"></script>
  <script src="./js/topup.js"></script>
</head>
<body class="bg-slate-900 min-h-screen text-gray-100">
  <!-- Navbar -->
  <nav class="bg-slate-800 border-b border-slate-700 px-4 py-3">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-xl font-semibold text-indigo-400">Top-Up Saldo Santri</h1>
      <div class="flex items-center space-x-4">
        <span id="adminName" class="text-sm text-gray-300"></span>
        <button onclick="logout()" class="text-sm text-red-400 hover:text-red-300">
          <i class="fas fa-sign-out-alt mr-1"></i>Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="container mx-auto p-4 md:p-6">
    <div class="bg-slate-800 rounded-xl border border-slate-700 shadow-lg p-6">
      <!-- Alert Messages -->
      <div id="alertSuccess" class="hidden mb-4 p-4 rounded-lg bg-emerald-600 text-white">
        <div class="flex items-start">
          <i class="fas fa-check-circle mt-1 mr-3"></i>
          <div class="flex-1" id="successMessage"></div>
          <button onclick="hideAlert('alertSuccess')" class="ml-3">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>

      <div id="alertError" class="hidden mb-4 p-4 rounded-lg bg-red-600 text-white">
        <div class="flex items-start">
          <i class="fas fa-exclamation-circle mt-1 mr-3"></i>
          <div class="flex-1" id="errorMessage"></div>
          <button onclick="hideAlert('alertError')" class="ml-3">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>

      <!-- Form Top-Up -->
      <form id="topupForm" class="space-y-6">
        <div class="grid md:grid-cols-2 gap-6">
          <!-- Kolom Kiri -->
          <div class="space-y-6">
            <div>
              <label for="santriSelect" class="block text-sm font-medium text-gray-300 mb-2">
                Pilih Santri <span class="text-red-500">*</span>
              </label>
              <select id="santriSelect" class="w-full" required>
                <option value="">Pilih santri...</option>
              </select>
            </div>

            <div>
              <label for="jumlah" class="block text-sm font-medium text-gray-300 mb-2">
                Jumlah Top-Up (Rp) <span class="text-red-500">*</span>
              </label>
              <div class="relative">
                <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">Rp</span>
                <input type="text" id="jumlah" name="jumlah" 
                       class="w-full rounded-md shadow-sm pl-8 pr-3 py-2"
                       required placeholder="0">
              </div>
            </div>
          </div>

          <!-- Kolom Kanan -->
          <div class="space-y-6">
            <div>
              <label for="metode" class="block text-sm font-medium text-gray-300 mb-2">
                Metode Pembayaran <span class="text-red-500">*</span>
              </label>
              <select id="metode" name="metode" class="w-full rounded-md shadow-sm" required>
                <option value="">Pilih metode...</option>
              </select>
            </div>

            <div>
              <label for="catatan" class="block text-sm font-medium text-gray-300 mb-2">
                Catatan
              </label>
              <textarea id="catatan" name="catatan" rows="2"
                        class="w-full rounded-md shadow-sm"
                        placeholder="Tambahkan catatan jika perlu..."></textarea>
            </div>
          </div>
        </div>

        <!-- Tombol Submit -->
        <div class="flex items-center justify-between pt-4 border-t border-slate-700">
          <a href="dashboard.html" class="text-gray-400 hover:text-gray-300">
            <i class="fas fa-arrow-left mr-2"></i>Kembali ke Dashboard
          </a>
          <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-md shadow-sm transition-colors">
            <i class="fas fa-save mr-2"></i>Proses Top-Up
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Konfirmasi Modal -->
  <div id="confirmModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
    <div class="bg-slate-800 rounded-xl border border-slate-700 p-6 max-w-md w-full mx-4">
      <h3 class="text-lg font-semibold text-gray-100 mb-4">Konfirmasi Top-Up</h3>
      <div id="confirmDetails" class="space-y-3 text-gray-300"></div>
      <div class="flex justify-end space-x-3 mt-6">
        <button onclick="hideConfirmModal()" 
                class="px-4 py-2 border border-gray-600 rounded-md text-gray-300 hover:bg-gray-700 transition-colors">
          Batal
        </button>
        <button onclick="processTopUp()" 
                class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-500 transition-colors">
          Konfirmasi
        </button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('topupForm').addEventListener('submit', function (ev) {
      ev.preventDefault();
      var data = {
        nis: document.getElementById('nis').value.trim(),
        nama: document.getElementById('nama').value.trim(),
        jumlah: Number(document.getElementById('jumlah').value) || 0,
        metode: document.getElementById('metode').value,
        penerima: document.getElementById('penerima').value.trim()
      };

      document.getElementById('status').textContent = 'Mengirim...';

      google.script.run.withSuccessHandler(function(res){
        if (res && res.success) {
          document.getElementById('status').textContent = 'Top-up berhasil. Saldo baru: Rp ' + (res.data.saldoBaru || 0).toLocaleString('id-ID');
        } else {
          document.getElementById('status').textContent = 'Gagal: ' + (res && res.message || 'Unknown error');
        }
      }).withFailureHandler(function(err){
        document.getElementById('status').textContent = 'Koneksi gagal: ' + err;
      }).processTopUp(data);
    });
  </script>
</body>
</html>
