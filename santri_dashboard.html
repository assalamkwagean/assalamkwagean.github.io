<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dashboard Santri - Tabungan</title>
  <link href="./css/tailwind.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.5s ease-out;
    }
    .gradient-bg {
      background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
    }
    .stat-card {
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      transition: all 0.3s ease;
    }
    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }
  </style>
  <script src="./config.js"></script>
  <script src="./js/gas-shim.js"></script>
</head>
<body class="bg-slate-900 min-h-screen text-gray-100">
  <!-- Header -->
  <nav class="bg-slate-800 border-b border-slate-700 px-4 py-3">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-xl font-semibold text-indigo-400">Dashboard Santri</h1>
      <div class="flex items-center space-x-4">
        <button onclick="logout()" class="text-sm text-red-400 hover:text-red-300">
          <i class="fas fa-sign-out-alt mr-1"></i>Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="container mx-auto p-4 md:p-6 max-w-4xl">
    <!-- Lookup Form -->
    <div class="bg-slate-800 rounded-lg border border-slate-700 p-6 mb-6 animate-fade-in">
      <div class="flex flex-col md:flex-row gap-4">
        <div class="flex-1">
          <label class="block text-sm font-medium text-gray-400 mb-2" for="nis">
            Nomor Induk Santri (NIS)
          </label>
          <input type="text" id="nis" 
                 class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
                 placeholder="Masukkan NIS">
        </div>
        <div class="flex items-end">
          <button id="load" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-md transition-colors flex items-center">
            <i class="fas fa-search mr-2"></i>Cari Data
          </button>
        </div>
      </div>
    </div>

    <!-- Alert Messages -->
    <div id="alertError" class="hidden mb-4 p-4 rounded-lg bg-red-600 text-white">
      <div class="flex items-start">
        <i class="fas fa-exclamation-circle mt-1 mr-3"></i>
        <div class="flex-1" id="errorMessage"></div>
        <button onclick="hideAlert('alertError')" class="ml-3">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>

    <!-- Data Display -->
    <div id="dataContainer" class="hidden animate-fade-in">
      <!-- Info Cards -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="stat-card rounded-lg p-4 border border-slate-700">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm text-gray-400">Nama Santri</span>
            <i class="fas fa-user text-indigo-400"></i>
          </div>
          <div class="text-lg font-bold text-white" id="namaSantri">-</div>
        </div>

        <div class="stat-card rounded-lg p-4 border border-slate-700">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm text-gray-400">Saldo</span>
            <i class="fas fa-wallet text-emerald-400"></i>
          </div>
          <div class="text-lg font-bold text-emerald-400" id="saldoSantri">Rp 0</div>
        </div>

        <div class="stat-card rounded-lg p-4 border border-slate-700">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm text-gray-400">Limit Harian</span>
            <i class="fas fa-clock text-yellow-400"></i>
          </div>
          <div class="text-lg font-bold text-yellow-400" id="limitHarian">Rp 0</div>
        </div>

        <div class="stat-card rounded-lg p-4 border border-slate-700">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm text-gray-400">Sisa Limit Hari Ini</span>
            <i class="fas fa-hourglass-half text-blue-400"></i>
          </div>
          <div class="text-lg font-bold text-blue-400" id="sisaLimit">Rp 0</div>
        </div>
      </div>

      <!-- Transaction History -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Top-Up History -->
        <div class="bg-slate-800 rounded-lg border border-slate-700 overflow-hidden">
          <div class="p-4 border-b border-slate-700 flex items-center">
            <i class="fas fa-arrow-up text-emerald-400 mr-2"></i>
            <h3 class="text-lg font-semibold">Riwayat Top-Up</h3>
          </div>
          <div class="p-4">
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead>
                  <tr class="text-left border-b border-slate-700">
                    <th class="px-4 py-2 text-gray-400">Tanggal</th>
                    <th class="px-4 py-2 text-gray-400">Jumlah</th>
                    <th class="px-4 py-2 text-gray-400">Metode</th>
                  </tr>
                </thead>
                <tbody id="topupHistory"></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Withdrawal History -->
        <div class="bg-slate-800 rounded-lg border border-slate-700 overflow-hidden">
          <div class="p-4 border-b border-slate-700 flex items-center">
            <i class="fas fa-arrow-down text-red-400 mr-2"></i>
            <h3 class="text-lg font-semibold">Riwayat Penarikan</h3>
          </div>
          <div class="p-4">
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead>
                  <tr class="text-left border-b border-slate-700">
                    <th class="px-4 py-2 text-gray-400">Tanggal</th>
                    <th class="px-4 py-2 text-gray-400">Jumlah</th>
                    <th class="px-4 py-2 text-gray-400">Metode</th>
                  </tr>
                </thead>
                <tbody id="withdrawalHistory"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/santri_dashboard.js"></script>
</body>
</html>
